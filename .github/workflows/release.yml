name: Release

on:
  release:
    types: [created]

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  package:
    name: Build and upload release artifact
    runs-on: windows-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and build dependencies
        run: pip install ".[dev]"

      - name: Build .exe and ZIP
        run: python scripts/package.py

      - name: Upload ZIP to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          zip_file=$(ls dist/excel-converter-v*-win64.zip)
          gh release upload "${{ github.event.release.tag_name }}" "$zip_file" --clobber
